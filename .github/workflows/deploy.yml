name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish capstone host (code-lab submodule + course exercise)
        run: >
          dotnet publish level3-host/compiler-host -c Release
          -p:ExerciseSource=${{ github.workspace }}/level3-exercise
          -o blazor-publish

      - name: Assemble site
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='level3-host' \
            --exclude='level3-exercise' \
            --exclude='level3-app' \
            --exclude='blazor-publish' \
            --exclude='_site' \
            ./ _site/
          cp -r blazor-publish/wwwroot _site/level3-app
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
